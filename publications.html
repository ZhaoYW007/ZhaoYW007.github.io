<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Full Publications &mdash; Yiwei Zhao</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Slab:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Navigation -->
<nav class="navbar">
  <div class="container nav-container">
    <a href="index.html" class="nav-brand">Yiwei Zhao</a>
    <button class="nav-toggle" aria-label="Toggle navigation">
      <span class="hamburger"></span>
    </button>
    <ul class="nav-links">
      <li><a href="index.html#about">About</a></li>
      <li><a href="index.html#news">News</a></li>
      <li><a href="index.html#education">Education</a></li>
      <li><a href="index.html#publications">Publications</a></li>
      <li><a href="index.html#awards">Awards</a></li>
    </ul>
  </div>
</nav>

<!-- Publications Section -->
<section id="publications" class="section">
  <div class="container">
    <h2 class="section-title">Full Publications</h2>
    <p class="section-note">* denotes equal contribution.<br>
    <a href="index.html#publications">&larr; Back to home</a></p>
    <ol class="publication-list" data-pubs="full"></ol>
  </div>
</section>

<!-- Footer -->
<footer class="footer">
  <div class="container">
    <p>&copy; Built and maintained by Yiwei Zhao.</p>
    <p class="footer-note">Last updated: <span id="last-updated">May 2026</span></p>
  </div>
</footer>

<script src="assets/coauthors.js"></script>
<script src="assets/papers.js"></script>
<script>
  // Mobile nav toggle
  document.querySelector('.nav-toggle').addEventListener('click', function() {
    document.querySelector('.nav-links').classList.toggle('active');
    this.classList.toggle('active');
  });

  // Close mobile nav on link click (cross-page links navigate normally)
  document.querySelectorAll('.nav-links a').forEach(link => {
    link.addEventListener('click', function() {
      document.querySelector('.nav-links').classList.remove('active');
      document.querySelector('.nav-toggle').classList.remove('active');
    });
  });

  // Navbar shadow on scroll
  window.addEventListener('scroll', function() {
    const nav = document.querySelector('.navbar');
    nav.classList.toggle('scrolled', window.scrollY > 10);
  });

  // Footer "Last updated" — pulled from the latest commit on GitHub
  fetch('https://api.github.com/repos/ZhaoYW007/ZhaoYW007.github.io/commits/main?per_page=1')
    .then(r => r.ok ? r.json() : Promise.reject(r.status))
    .then(data => {
      const d = new Date(data.commit.author.date);
      const label = d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
      document.getElementById('last-updated').textContent = label;
    })
    .catch(() => { /* keep static fallback */ });
</script>

</body>
</html>
